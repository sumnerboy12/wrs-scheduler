services:
  rostr:
    build: .
    image: rostr:latest
    container_name: rostr
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/server/data
    # Optional — only needed for the Schedule > Summaries > email feature.
    # Create a .env file next to this docker-compose.yml (docker compose
    # loads it automatically) with SMTP_HOST/SMTP_USER/SMTP_PASS etc. set;
    # leave it out entirely and email sending just stays disabled.
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-}
      - SMTP_REPLY_TO=${SMTP_REPLY_TO:-}
      # Optional — enables "Sign in with SSO" via any OpenID Connect
      # provider. See server/.env.example for details.
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-}
      # Optional — periodically imports approved leave from an external
      # calendar feed. See server/.env.example for details.
      - LEAVE_CALENDAR_URL=${LEAVE_CALENDAR_URL:-}
      - LEAVE_SYNC_INTERVAL_MINUTES=${LEAVE_SYNC_INTERVAL_MINUTES:-60}
